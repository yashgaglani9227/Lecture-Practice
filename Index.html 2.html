<!DOCTYPE html>
<html>
<head>
	<title>Html Lecture</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
	<!-- BDO Tag -->
	<p>
		
	</p>

	<bdo dir="ltr">This is BDO Tag</bdo>

	<!-- Table Tag -->

	<table border="1" cellpadding="10" cellspacing="10" style="border-collapse: collapse;">
		<caption>This is Table Tag</caption>
		<thead>
			<tr>
				<th>Name</th>
				<th>Age</th>
				<th>Country</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>Bhautik</td>
				<td>40</td>
				<td>India</td>
			</tr>
			<tr>
				<td>Chirag</td>
				<td>35</td>
				<td>India</td>
			</tr>
			<tr>
				<td>Harsh</td>
				<td>45</td>
				
				<td>India</td>
			</tr>
		</tbody>
	</table>

	<!-- Form Tag -->

	<form>
		<fieldset>
			<legend>Form Tag</legend>
			<figcaption>This is form Tag</figcaption>
			<center>
			<label>firstName :</label>
			<input type="text" placeholder="Enter firstname" required><br>
			<label>lastName</label>
			<input type="text" placeholder="Enter lastname" required><br>
			<button type="submit">Submit</button>
		</center>
		</fieldset>
	</form>

	<!-- Semantic Tags --->

	<section></section>
	<article></article>
	<main></main>
	<aside></aside>
	<header></header>
	<footer></footer>
	<nav></nav>
	<details></details>


	<!-- Non-Semantic Tags -->

	<div></div>
	<span></span>

	<!-- audio and video tag -->

	<audio controls>
		<source src="./song/song.mp3">
	</audio>

	<video controls>
		<source src="./video/video.mp4">
	</video>

	<i class="fa-brands fa-apple" style="color: rgb(30, 48, 80);"></i>

</body>
</html>
